<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Merry Scratch</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple 主屏幕图标 -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">

  <!-- Apple 全屏 Web App 支持 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Merry Scratch">

  <!-- 主题色 -->
  <meta name="theme-color" content="#000000">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      /* 安全区域适配 iPhone 刘海屏 */
      height: 100dvh;
      overflow: hidden;
      background: #000;
      /* 禁止文字选中和长按菜单 */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      /* 防止页面下拉刷新和回弹 */
      overscroll-behavior: none;
      position: fixed;
      top: 0;
      left: 0;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none; /* 禁止浏览器默认手势 */
    }
    #treeCanvas {
      z-index: 1;
    }
    #scratchCanvas {
      z-index: 2;
    }
    #particleCanvas {
      z-index: 3;
      pointer-events: none;
    }
    #hint { display: none; }
    /* 打字机引导文字 */
    #guideText {
      position: fixed;
      bottom: 25%;
      width: 100%;
      text-align: center;
      z-index: 5;
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      font-size: clamp(16px, 4vw, 22px);
      letter-spacing: 3px;
      pointer-events: none;
      line-height: 2;
      transition: opacity 0.4s ease;
    }
    /* 闪烁光标 */
    #guideText::after {
      content: '|';
      animation: blink 0.8s step-end infinite;
      color: rgba(255, 255, 255, 0.4);
    }
    #guideText.done::after {
      display: none;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    /* 添加到主屏幕引导提示（iOS 专属） */
    #installTip {
      display: none;
      position: fixed;
      bottom: 30px;
      width: 100%;
      text-align: center;
      z-index: 6;
      color: rgba(255, 255, 255, 0.5);
      font-family: -apple-system, 'PingFang SC', sans-serif;
      font-size: 13px;
      pointer-events: none;
    }
    /* 重新抽取按钮 */
    #replayBtn {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 12px 28px;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.8);
      font-family: -apple-system, 'PingFang SC', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #replayBtn:active {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.7);
      color: #fff;
      transform: translateX(-50%) scale(0.95);
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="treeCanvas"></canvas>
    <canvas id="scratchCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
  </div>
  <div id="guideText"></div>
  <div id="installTip">💡 点击分享 → 添加到主屏幕，体验更佳</div>
  <button id="replayBtn" onclick="window.__merryScratch.resetTree()">🎄 重新抽取一棵圣诞树</button>

  <script src="renderer/storage.js"></script>
  <script src="renderer/tree-drawer.js"></script>
  <script src="renderer/sound-manager.js"></script>
  <script src="renderer/particle-system.js"></script>
  <script src="renderer/scratch-layer.js"></script>
  <script src="renderer/app.js"></script>
</body>
</html>
